{% extends 'base.html' %}

{% block content %}
<div class="fade-in" style="max-width: 800px; margin: 0 auto;">
    <div class="mb-8">
        <h1 class="text-2xl font-bold">Add New Medicine</h1>
        <p class="text-muted">Register a new product in the system catalog</p>
    </div>

    <div class="card">
        <form action="{{ url_for('inventory.add_medicine') }}" method="POST">
            <div class="form-grid">
                <div class="form-group">
                    <label>Medicine Name</label>
                    <input type="text" name="name" class="form-control" placeholder="e.g. Paracetamol" required>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select name="category" class="form-control">
                        <option value="Analgesic">Analgesic</option>
                        <option value="Antibiotic">Antibiotic</option>
                        <option value="Antipyretic">Antipyretic</option>
                        <option value="Antiseptic">Antiseptic</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Expiry Date</label>
                    <input type="date" name="expiry_date" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Unit Price ($)</label>
                    <input type="number" step="0.01" name="price" class="form-control" placeholder="0.00" required>
                </div>
            </div>
            
            <div style="margin-top: 1rem; display: flex; gap: 1rem;">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Save Medicine
                </button>
                <a href="{{ url_for('inventory.list_medicines') }}" class="btn" style="background: #f1f5f9; color: #475569;">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
