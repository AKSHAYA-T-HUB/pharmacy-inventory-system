{% extends 'base.html' %}

{% block content %}
<div class="fade-in" style="max-width: 600px; margin: 0 auto;">
    <div class="mb-8">
        <h1 class="text-2xl font-bold">Sales Terminal</h1>
        <p class="text-muted">Process a new transaction</p>
    </div>

    <div class="card">
        <form action="{{ url_for('sales.add_sale') }}" method="POST">
            <div class="form-group">
                <label>Select Medicine</label>
                <select name="medicine_id" class="form-control" required>
                    {% for med in medicines %}
                    <option value="{{ med.id }}" {{ 'selected' if med.id == selected_id }}>{{ med.name }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label>Quantity Sold</label>
                <input type="number" name="quantity" class="form-control" placeholder="0" min="1" required>
            </div>
            
            <div style="margin-top: 2rem; display: flex; gap: 1rem;">
                <button type="submit" class="btn btn-primary" style="background: var(--success);">
                    <i class="fas fa-check-circle"></i> Complete Sale
                </button>
                <a href="{{ url_for('main.index') }}" class="btn" style="background: #f1f5f9; color: #475569;">Back</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
