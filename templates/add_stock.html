{% extends "base.html" %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto; width: 100%;">
    <div class="page-header" style="justify-content: center; text-align: center; border: none; margin-bottom: 1rem;">
        <div>
            <h2>Record Inbound Stock</h2>
            <p style="color: var(--text-muted); margin-top: 0.5rem; font-size: 0.9rem;">Update inventory levels for existing catalog items.</p>
        </div>
    </div>

    <div class="glass-card">
        <form method="POST">
            <div class="form-group">
                <label>Target Medicine</label>
                <select name="medicine_id" class="form-control" required style="cursor: pointer;">
                    <option value="" disabled selected>-- Select from Catalog --</option>
                    {% for med in medicines %}
                        <option value="{{ med[0] }}">#MD{{ med[0] }} - {{ med[1] }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label>Arrival Quantity (Units)</label>
                <input type="number" name="quantity" class="form-control" placeholder="0" min="1" required>
            </div>
            
            <div style="margin-top: 2rem;">
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; font-size: 1.1rem; background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);">
                    Append To Inventory
                </button>
                
                <div style="text-align: center; margin-top: 1rem;">
                    <a href="/stock" style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem;">
                        <span style="display:inline-block; transform: rotate(180deg);">➔</span> Cancel Delivery
                    </a>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
