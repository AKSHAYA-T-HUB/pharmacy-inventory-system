<!DOCTYPE html>
<html>
<head>
    <title>Stock</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f9fbfd;
            text-align: center;
        }

        table {
            border-collapse: collapse;
            width: 75%;
            margin: 30px auto;
            background: white;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.08);
        }

        th {
            background-color: #e3f2fd;
            padding: 12px;
            border: 1px solid #ccc;
        }

        td {
            padding: 10px;
            border: 1px solid #ddd;
        }

        .low-stock {
            background-color: #ffebee;
        }

        .delete-btn {
            color: white;
            background: #e74c3c;
            padding: 5px 10px;
            border-radius: 5px;
            text-decoration: none;
        }

        .delete-btn:hover {
            background: #c0392b;
        }

        .back-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 8px 15px;
            background: #90caf9;
            color: #2c3e50;
            border-radius: 6px;
            text-decoration: none;
        }

        .back-btn:hover {
            background: #64b5f6;
        }
    </style>
</head>
<body>

<h1>Stock Details</h1>

<table>
    <tr>
        <th>Medicine ID</th>
        <th>Medicine Name</th>
        <th>Quantity</th>
        <th>Last Updated</th>
        <th>Action</th>
    </tr>

    {% for item in stock_data %}
    <tr class="{% if item[2]|int < 20 %}low-stock{% endif %}">
        <td>{{ item[0] }}</td>
        <td>{{ item[1] }}</td>
        <td>{{ item[2] }}</td>
        <td>{{ item[3] }}</td>
        <td>
            <a href="/delete-stock/{{ item[0] }}" class="delete-btn">
                Delete
            </a>
        </td>
    </tr>
    {% endfor %}
</table>

<a href="/" class="back-btn">⬅ Back to Home</a>

</body>
</html>
