{% extends "base.html" %}

{% block content %}

<h2 style="text-align:center; margin-top:20px;">Medicines List</h2>

<table style="width:90%; margin:auto; border-collapse:collapse; margin-top:20px;">
<tr style="background:#e3f2fd;">
    <th style="padding:10px; border:1px solid #ccc;">ID</th>
    <th style="padding:10px; border:1px solid #ccc;">Name</th>
    <th style="padding:10px; border:1px solid #ccc;">Category</th>
    <th style="padding:10px; border:1px solid #ccc;">Expiry Date</th>
    <th style="padding:10px; border:1px solid #ccc;">Price</th>
    <th style="padding:10px; border:1px solid #ccc;">Action</th>
</tr>

{% for med in medicines %}
<tr style="text-align:center;">
    <td style="padding:8px; border:1px solid #ddd;">{{ med[0] }}</td>
    <td style="padding:8px; border:1px solid #ddd;">{{ med[1] }}</td>
    <td style="padding:8px; border:1px solid #ddd;">{{ med[2] }}</td>
    <td style="padding:8px; border:1px solid #ddd;">{{ med[3] }}</td>
    <td style="padding:8px; border:1px solid #ddd;">₹ {{ med[4] }}</td>
    <td style="padding:8px; border:1px solid #ddd;">
        
        <!-- Delete Button -->
        <a href="/delete-medicine/{{ med[0] }}" 
           style="color:white; background:#e74c3c; padding:5px 10px; 
                  border-radius:5px; text-decoration:none;">
           Delete
        </a>

    </td>
</tr>
{% endfor %}

</table>

<div style="text-align:center; margin-top:20px;">
    <a href="/add-medicine" 
       style="background:#2ecc71; color:white; padding:10px 15px; 
              border-radius:6px; text-decoration:none;">
        + Add New Medicine
    </a>
</div>

{% endblock %}
