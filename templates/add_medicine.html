{% extends "base.html" %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto; width: 100%;">
    <div class="page-header" style="justify-content: center; text-align: center; border: none; margin-bottom: 1rem;">
        <div>
            <h2>Register New Medicine</h2>
            <p style="color: var(--text-muted); margin-top: 0.5rem; font-size: 0.9rem;">Enter the clinical and pricing details of the new drug.</p>
        </div>
    </div>

    <div class="glass-card">
        <form method="POST">
            <div class="form-group">
                <label>Commercial Name</label>
                <input type="text" name="name" class="form-control" placeholder="e.g. Paracetamol 500mg" required>
            </div>
            
            <div class="form-group">
                <label>Therapeutic Category</label>
                <input type="text" name="category" class="form-control" placeholder="e.g. Analgesic, Antibiotic" required>
            </div>
            
            <div class="flex gap-1">
                <div class="form-group" style="flex: 1;">
                    <label>Expiration Date</label>
                    <input type="date" name="expiry_date" class="form-control" required style="color-scheme: dark;">
                </div>
                
                <div class="form-group" style="flex: 1;">
                    <label>Unit Price (₹)</label>
                    <input type="number" name="price" step="0.01" class="form-control" placeholder="0.00" required>
                </div>
            </div>
            
            <div style="margin-top: 2rem;">
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; font-size: 1.1rem;">
                    Confirm Registration
                </button>
                
                <div style="text-align: center; margin-top: 1rem;">
                    <a href="/medicines" style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem;">
                        Cancel & Return
                    </a>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
